<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Acesso negado - Karteria</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="stylesheet" th:href="@{/css/karteria-colors.css}" />
        <th:block th:replace="~{_tailwind :: tailwind}"></th:block>
    </head>
    <body class="tw-min-h-screen tw-bg-slate-950 tw-text-white">
        <main class="tw-relative tw-flex tw-min-h-screen tw-items-center tw-justify-center tw-overflow-hidden tw-px-6 tw-py-12">
            <div class="tw-absolute tw-inset-0 tw-bg-[radial-gradient(circle_at_25%_25%,rgba(245,158,11,.22),transparent_30%),radial-gradient(circle_at_80%_75%,rgba(34,197,94,.24),transparent_34%)]"></div>
            <section class="tw-relative tw-w-full tw-max-w-3xl tw-rounded-[28px] tw-border tw-border-white/10 tw-bg-white/10 tw-p-8 tw-shadow-soft tw-backdrop-blur-xl sm:tw-p-12">
                <div class="tw-mb-8 tw-flex tw-h-14 tw-w-14 tw-items-center tw-justify-center tw-rounded-2xl tw-bg-amber-400 tw-text-slate-950">
                    <i class="fas fa-lock tw-text-2xl"></i>
                </div>
                <p class="tw-mb-3 tw-text-sm tw-font-semibold tw-uppercase tw-tracking-[0.2em] tw-text-amber-100">Erro 403</p>
                <h1 class="tw-mb-4 tw-text-4xl tw-font-extrabold tw-leading-tight sm:tw-text-6xl">Você não tem acesso a esta área.</h1>
                <p class="tw-mb-8 tw-max-w-2xl tw-text-lg tw-leading-8 tw-text-slate-200">
                    A página solicitada exige outro perfil ou uma sessão válida. Troque o perfil ativo ou volte para o painel.
                </p>
                <div class="tw-flex tw-flex-col tw-gap-3 sm:tw-flex-row">
                    <a th:href="@{/escolher-perfil}" class="tw-inline-flex tw-items-center tw-justify-center tw-rounded-2xl tw-bg-amber-400 tw-px-5 tw-py-3 tw-font-semibold tw-text-slate-950 tw-no-underline tw-transition hover:tw-bg-amber-300">
                        <i class="fas fa-exchange-alt tw-mr-2"></i>
                        Trocar perfil
                    </a>
                    <a th:href="@{/home}" class="tw-inline-flex tw-items-center tw-justify-center tw-rounded-2xl tw-border tw-border-white/20 tw-px-5 tw-py-3 tw-font-semibold tw-text-white tw-no-underline tw-transition hover:tw-bg-white/10">
                        Voltar ao painel
                    </a>
                </div>
            </section>
        </main>
    </body>
</html>
