<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Erro - Karteria</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="stylesheet" th:href="@{/css/karteria-colors.css}" />
        <th:block th:replace="~{_tailwind :: tailwind}"></th:block>
    </head>
    <body class="tw-min-h-screen tw-bg-slate-950 tw-text-white">
        <main class="tw-relative tw-flex tw-min-h-screen tw-items-center tw-justify-center tw-overflow-hidden tw-px-6 tw-py-12">
            <div class="tw-absolute tw-inset-0 tw-bg-[radial-gradient(circle_at_20%_20%,rgba(34,197,94,.24),transparent_32%),radial-gradient(circle_at_85%_75%,rgba(99,102,241,.2),transparent_34%)]"></div>
            <section class="tw-relative tw-w-full tw-max-w-3xl tw-rounded-[28px] tw-border tw-border-white/10 tw-bg-white/10 tw-p-8 tw-shadow-soft tw-backdrop-blur-xl sm:tw-p-12">
                <div class="tw-mb-8 tw-flex tw-h-14 tw-w-14 tw-items-center tw-justify-center tw-rounded-2xl tw-bg-karteria-500 tw-text-white">
                    <i class="fas fa-triangle-exclamation tw-text-2xl"></i>
                </div>
                <p class="tw-mb-3 tw-text-sm tw-font-semibold tw-uppercase tw-tracking-[0.2em] tw-text-karteria-100">
                    Erro <span th:text="${status ?: 'inesperado'}">inesperado</span>
                </p>
                <h1 class="tw-mb-4 tw-text-4xl tw-font-extrabold tw-leading-tight sm:tw-text-6xl">Não conseguimos concluir essa ação.</h1>
                <p class="tw-mb-8 tw-max-w-2xl tw-text-lg tw-leading-8 tw-text-slate-200">
                    A rota solicitada retornou uma falha. Você pode voltar para a página inicial ou tentar novamente.
                </p>
                <div class="tw-flex tw-flex-col tw-gap-3 sm:tw-flex-row">
                    <a th:href="@{/home}" class="tw-inline-flex tw-items-center tw-justify-center tw-rounded-2xl tw-bg-karteria-500 tw-px-5 tw-py-3 tw-font-semibold tw-text-white tw-no-underline tw-transition hover:tw-bg-karteria-600">
                        <i class="fas fa-home tw-mr-2"></i>
                        Ir para o painel
                    </a>
                    <a th:href="@{/}" class="tw-inline-flex tw-items-center tw-justify-center tw-rounded-2xl tw-border tw-border-white/20 tw-px-5 tw-py-3 tw-font-semibold tw-text-white tw-no-underline tw-transition hover:tw-bg-white/10">
                        Página inicial
                    </a>
                </div>
            </section>
        </main>
    </body>
</html>
