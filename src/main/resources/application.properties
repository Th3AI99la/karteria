# --- CONEXÃO COM O BANCO DE DADOS (POSTGRESQL NO DOCKER) ---
# A URL usa 'localhost' porque o Docker mapeou a porta para o seu Windows
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=kart_2001
spring.datasource.driver-class-name=org.postgresql.Driver


# --- ESTRATÉGIA DO HIBERNATE ---
# 'update' cria as tabelas automaticamente se elas não existirem
spring.jpa.hibernate.ddl-auto=update

# Mostra as queries no console (bom para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Define o dialeto correto para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# --- CONFIGURAÇÃO DO SERVIDOR ---
server.port=8080
server.address=0.0.0.0


# --- CONFIGURAÇÕES DE SEGURANÇA (JWT) ---
# Chave secreta usada para assinar os tokens (256 bits em hexadecimal)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Tempo de expiração do token em milissegundos (86400000 = 1 dia)
jwt.expiration=86400000