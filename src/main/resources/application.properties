# --- CONEXÃO COM O BANCO DE DADOS (POSTGRESQL NO DOCKER) ---
# A URL usa 'localhost' porque o Docker mapeou a porta para o seu Windows
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:kart_2001}
spring.datasource.driver-class-name=org.postgresql.Driver


# --- ESTRATÉGIA DO HIBERNATE ---
# 'update' cria as tabelas automaticamente se elas não existirem
spring.jpa.hibernate.ddl-auto=update

# Logs SQL podem ser ativados por ambiente quando precisar debugar
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# Define o dialeto correto para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# --- CONFIGURAÇÃO DO SERVIDOR ---
server.port=8080
server.address=0.0.0.0


# --- CONFIGURAÇÕES DE SEGURANÇA (JWT) ---
# Chave secreta usada para assinar os tokens (256 bits em hexadecimal)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Tempo de expiração do token em milissegundos (86400000 = 1 dia)
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- CONFIGURAÇÃO DE E-MAIL (GMAIL) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# As credenciais são lidas magicamente pelo spring-dotenv
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# URL base para os links (Localhost)
app.url=${APP_URL:http://localhost:8080}
