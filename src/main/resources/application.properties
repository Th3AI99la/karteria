# Nome da Aplicação
spring.application.name=karteria

# Configurações do Banco de Dados H2 (Em Memória)
spring.datasource.url=jdbc:h2:mem:karteria_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilita o cache do Thymeleaf para desenvolvimento
spring.thymeleaf.cache=false

# Habilita logs DEBUG especificamente para o nosso serviço de segurança
logging.level.com.projeto.karteria.service.ActiveProfileSecurityService=DEBUG

# Habilita o uso de threads virtuais (Project Loom)
spring.threads.virtual.enabled=true

# --- Configurações JWT para a API Mobile ---
# Chave secreta de 256-bits (Usada para assinar os tokens do React Native)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Tempo de expiração em milissegundos (86400000 = 1 dia)
jwt.expiration=86400000